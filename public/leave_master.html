<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Leave Master - HRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== SIDEBAR STYLES ===== */
        
        .sidebar {
            width: 220px;
            background: #fff;
            border-right: 1px solid #ddd;
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            left: 0;
            top: 0;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .sidebar .menu {
            padding-top: 20px;
            flex: 1;
        }
        
        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 20px;
            color: #2c3e50;
            padding: 0 15px;
        }
        
        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #555;
            text-decoration: none;
            transition: 0.3s;
            font-size: 15px;
            border-radius: 6px;
            margin: 5px 10px;
        }
        
        .sidebar a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .sidebar a:hover {
            background: #f0f0f0;
        }
        
        .sidebar a.active {
            background: #f0f0f0;
            color: #3498db;
            font-weight: 600;
        }
        
        .sidebar .support {
            padding: 20px;
            border-top: 1px solid #eee;
        }
        
        .main-content {
            margin-left: 220px;
            padding: 20px;
            min-height: 100vh;
        }
        
        .submenu {
            display: none;
            flex-direction: column;
            margin-left: 15px;
            border-left: 2px solid #e0e0e0;
            position: relative;
            width: calc(100% - 30px);
        }
        
        .submenu.active {
            display: flex;
        }
        
        .submenu a {
            padding: 10px 15px;
            margin: 2px 10px;
            font-size: 14px;
        }
        
        .submenu a i {
            font-size: 12px;
        }
        
        .menu-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            cursor: pointer;
        }
        
        .menu-toggle .arrow {
            margin-left: auto;
            transition: transform 0.3s;
        }
        
        .menu-toggle.active .arrow {
            transform: rotate(180deg);
        }
        /* EXISTING STYLES */
        
         :root {
            --bg: #f6f7f9;
            --card: #ffffff;
            --muted: #9aa3ad;
            --accent: #2b8be6;
            --text: #1f2933;
            --table-border: #eef2f6;
        }
        
        * {
            box-sizing: border-box
        }
        
        body {
            margin: 0;
            font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: linear-gradient(180deg, #f4f6f8 0%, #f6f7f9 100%);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .paper {
            width: 1024px;
            margin: 28px auto;
            background: var(--card);
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
            border-radius: 6px;
            padding: 22px 28px;
            border: 1px solid #e6e9ec;
        }
        /* KEEP ONLY THE BRAND HEADER */
        
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-right: 20px;
        }
        
        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 2px 18px
        }
        
        .title-row h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700
        }
        
        .btn {
            background: var(--accent);
            color: #fff;
            padding: 10px 14px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px
        }
        
        .btn .plus {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.18);
            text-align: center;
            line-height: 18px;
            font-weight: 700
        }
        
        .table-wrap {
            background: transparent;
            border-radius: 6px;
            padding: 10px;
            border-top: 1px solid transparent
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px
        }
        
        thead tr th {
            text-align: left;
            padding: 14px 12px;
            color: var(--muted);
            font-weight: 600;
            border-bottom: 1px solid var(--table-border);
        }
        
        tbody tr td {
            padding: 14px 12px;
            border-bottom: 1px solid #f0f4f7;
            color: #3b4750
        }
        
        .emp-id {
            font-weight: 700;
            color: #2b2f33
        }
        
        .leave-type {
            color: #6b7280;
            font-weight: 600
        }
        
        .leave-desc {
            color: #7b8791
        }
        
        .add-leave-btn {
            background: #007bff;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
        }
        
        .balance {
            font-weight: 600;
            text-align: right
        }
        
        .edit a {
            color: var(--accent);
            text-decoration: none
        }
        
        .edit-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            /* space between icon and text */
            text-decoration: none;
            font-weight: 500;
        }
        
        .edit-link i {
            font-size: 14px;
        }
        
        td a {
            text-decoration: none;
            color: inherit;
            background-color: #b6bec4;
            border-radius: 5px;
            padding: 2px 12px;
        }
        
        .paper .spacer {
            height: 260px
        }
        
        @media (max-width:1100px) {
            .paper {
                width: 94%
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="menu">
            <h2>ALMS</h2>
            <a href="dashboard.html">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </a>

            <!-- Employees - Admin Only -->
            <a href="employee_list.html" id="empMgmtLink" style="display: none;">
                <i class="fa-solid fa-users"></i> Employees
            </a>

            <a href="attendance.html">
                <i class="fa-regular fa-clock"></i> Attendance
            </a>

            <a href="holidays.html">
                <i class="fa-regular fa-calendar"></i> Holidays
            </a>

            <!-- Leaves with sub-menu -->
            <a href="javascript:void(0)" id="leavesToggle" class="menu-toggle">
                <span>
                    <i class="fa-solid fa-chart-bar"></i> Leaves
                </span>
                <i class="fa-solid fa-caret-down arrow"></i>
            </a>
            <div id="leavesSubmenu" class="submenu">
                <a href="leave_applications.html">
                    <i class="fa-regular fa-circle"></i> Leave Applications
                </a>
                <a href="leave_master.html" class="active">
                    <i class="fa-regular fa-circle"></i> Leave Master
                </a>
            </div>

            <!-- Reports with sub-menu - Admin Only -->
            <a href="javascript:void(0)" id="reportsToggle" class="menu-toggle" style="display: none;">
                <span>
                    <i class="fa-solid fa-chart-pie"></i> Reports
                </span>
                <i class="fa-solid fa-caret-down arrow"></i>
            </a>
            <div id="reportsSubmenu" class="submenu">
                <a href="reports.html">
                    <i class="fa-regular fa-circle"></i> General Reports
                </a>
                <a href="attendance_report.html">
                    <i class="fa-regular fa-circle"></i> Attendance Reports
                </a>
                <a href="leave_report.html">
                    <i class="fa-regular fa-circle"></i> Leave Reports
                </a>
            </div>

            <a href="#">
                <i class="fa-solid fa-gear"></i> Settings
            </a>
        </div>

        <div class="support">
            <a href="#">
                <i class="fa-regular fa-circle-question"></i> Help & Support
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="paper" role="main">
            <!-- KEEP ONLY THE BRAND HEADER -->
            <div class="top">
                <div class="brand">
                    <div class="logo-text">ALMS</div>
                </div>
            </div>

            <div class="title-row">
                <h2>Leave Master</h2>
                <a href="adjust_leave_balance.html" class="add-leave-btn" id="addLeaveBtn"> <span style="font-size: larger;">&#43;</span> Add Leave Balance</a>
            </div>

            <div class="table-wrap">
                <table aria-describedby="leave-table">
                    <thead>
                        <tr>
                            <th style="width:16%">EMPLOYEE ID</th>
                            <th style="width:24%">LEAVE TYPE</th>
                            <th style="width:46%">LEAVE DESCRIPTION</th>
                            <th style="width:8%;text-align:right">BALANCE</th>
                            <th style="width:8%;text-align:center">EDIT</th>
                        </tr>
                    </thead>
                    <tbody id="leaveTableBody">
                        <!-- Leave rows populated dynamically -->
                    </tbody>
                </table>
            </div>

            <div class="spacer"></div>
        </div>
    </div>

    <script>
        // Sidebar functionality
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem("role") || "employee";

            // Role-based access control
            const adminOnlyElements = [
                'empMgmtLink',
                'reportsToggle'
            ];

            adminOnlyElements.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.style.display = role === "admin" ? "flex" : "none";
                }
            });

            // Submenu toggle functionality
            const leavesToggle = document.getElementById("leavesToggle");
            const leavesSubmenu = document.getElementById("leavesSubmenu");

            if (leavesToggle && leavesSubmenu) {
                leavesToggle.addEventListener('click', () => {
                    leavesToggle.classList.toggle('active');
                    leavesSubmenu.classList.toggle('active');
                });
            }

            const reportsToggle = document.getElementById("reportsToggle");
            const reportsSubmenu = document.getElementById("reportsSubmenu");

            if (reportsToggle && reportsSubmenu) {
                reportsToggle.addEventListener('click', () => {
                    reportsToggle.classList.toggle('active');
                    reportsSubmenu.classList.toggle('active');
                });
            }

            // Set active page highlighting
            const currentPage = window.location.pathname.split("/").pop();
            const sidebarLinks = document.querySelectorAll('.sidebar a[href]');

            sidebarLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPage || (currentPage === '' && href === 'dashboard.html')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });

        // EXISTING SCRIPT
        const role = localStorage.getItem("role") || "employee";
        const empId = (localStorage.getItem("EmpId") || '').trim();
        const tableBody = document.getElementById("leaveTableBody");

        // Leave code → name mapping
        const leaveNameMap = {
            'CL': 'Casual Leave',
            'EL': 'Earned Leave',
            'HL': 'Hospital Leave',
            'ML': 'Maternity Leave',
            'PL': 'Paternity Leave',
            'SL': 'Sick Leave',
            'VL': 'Vacation Leave'
        };

        // Fetch leave master list
        async function refreshLeaveTable() {
            try {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#666;">Loading leave data...</td></tr>';

                const response = await fetch(`/api/leave_master?role=${role}&EmpId=${empId}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                renderTable(data);
            } catch (err) {
                console.error('Error fetching leave master:', err);
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:red;">Failed to load leave data. Please check if server is running.</td></tr>';
            }
        }

        // Render table
        function renderTable(data) {
            tableBody.innerHTML = '';

            if (!data || data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#666;">No leave data available</td></tr>';
                return;
            }

            let hasData = false;
            data.forEach(leave => {
                        if (role === 'admin' || (leave.EmpId || '').trim() === empId) {
                            hasData = true;
                            const row = document.createElement('tr');
                            row.innerHTML = `
                    <td>${leave.EmpId || 'N/A'}</td>
                    <td>${leave.leave_name || leaveNameMap[leave.leave_code] || leave.leave_code}</td>
                    <td>${leave.leave_desc || 'No description'}</td>
                    <td>${leave.balance ?? 0}</td>
                    <td>${role === 'admin'
    ? `<a href="adjust_leave_balance.html?empId=${encodeURIComponent(leave.EmpId)}&type=${encodeURIComponent(leave.leave_code)}" class="edit-link"><i class='fas fa-pencil-alt'></i> Edit</a>`
    : '-'}</td>
    `;
                tableBody.appendChild(row);
            }
        });

        if (!hasData) {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#666;">No leave data available for your account</td></tr>';
        }
    }

    // Handle Add Leave Balance button and page load
    document.addEventListener('DOMContentLoaded', () => {
        const addBtn = document.querySelector('.add-leave-btn');
        const adjustLeaveLink = document.getElementById("adjustLeaveLink");

        // Hide "Add Leave Balance" button and navigation link for non-admin users
        if (role !== 'admin') {
            if (addBtn) addBtn.style.display = 'none';
            if (adjustLeaveLink) adjustLeaveLink.style.display = 'none';
        } else {
            // Admin users can see and use the button
            if (addBtn) {
                addBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    window.location.href = "adjust_leave_balance.html";
                });
            }
        }

        // Load initial table data
        refreshLeaveTable();
    });

    // Auto-refresh if redirected back from adjust_leave_balance.html
    window.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem("leaveUpdated") === "true") {
            localStorage.removeItem("leaveUpdated");
            refreshLeaveTable();
        }
    });

    // Handle postMessage from adjust_leave_balance.html
    window.addEventListener('message', function(event) {
        if (event.data.action === "refreshLeaveData") {
            refreshLeaveTable();
        }
    });
    </script>

</body>

</html>
