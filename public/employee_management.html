<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Employee</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ===== SIDEBAR STYLES ===== */
    .sidebar {
        width: 220px;
        background: #fff;
        border-right: 1px solid #ddd;
        height: 100vh;
        position: fixed;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        left: 0;
        top: 0;
        z-index: 1000;
        overflow-y: auto;
    }

    .sidebar .menu {
        padding-top: 20px;
        flex: 1;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 20px;
        color: #2c3e50;
        padding: 0 15px;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        color: #555;
        text-decoration: none;
        transition: 0.3s;
        font-size: 15px;
        border-radius: 6px;
        margin: 5px 10px;
    }

    .sidebar a i {
        margin-right: 10px;
        width: 20px;
        text-align: center;
    }

    .sidebar a:hover {
        background: #f0f0f0;
    }

    .sidebar a.active {
        background: #f0f0f0;
        color: #3498db;
        font-weight: 600;
    }

    .sidebar .support {
        padding: 20px;
        border-top: 1px solid #eee;
    }

    .main-content {
        margin-left: 220px;
        padding: 20px;
        min-height: 100vh;
    }

    .submenu {
        display: none;
        flex-direction: column;
        margin-left: 15px;
        border-left: 2px solid #e0e0e0;
        position: relative;
        width: calc(100% - 30px);
    }

    .submenu.active {
        display: flex;
    }

    .submenu a {
        padding: 10px 15px;
        margin: 2px 10px;
        font-size: 14px;
    }

    .submenu a i {
        font-size: 12px;
    }

    .menu-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        cursor: pointer;
    }

    .menu-toggle .arrow {
        margin-left: auto;
        transition: transform 0.3s;
    }

    .menu-toggle.active .arrow {
        transform: rotate(180deg);
    }

    /* EXISTING STYLES */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f7fa;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 5px;
      font-size: 22px;
      color: #2c3e50;
    }
    p {
      margin-bottom: 20px;
      color: #666;
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
    }

    input, select, textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    .full-width {
      grid-column: span 2;
    }

    .employee-type {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .employee-type label {
      font-weight: normal;
    }

    .buttons {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 20px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .btn.cancel {
      background: #ccc;
      color: #333;
    }
    .btn.submit {
      background: #3498db;
      color: #fff;
    }

    small.error-text {
      color: red;
      display: none;
      margin-top: 4px;
    }

    #empid-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      background: #fff;
      border: 1px solid #ccc;
      list-style: none;
      margin: 0;
      padding: 5px;
      width: 100%;
      display: none;
      max-height: 150px;
      overflow-y: auto;
      z-index: 1000;
    }
    #empid-dropdown li {
      padding: 6px;
      cursor: pointer;
    }
    #empid-dropdown li:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
      <div class="menu">
          <h2>ALMS</h2>
          <a href="dashboard.html">
              <i class="fa-solid fa-chart-line"></i> Dashboard
          </a>

          <a href="employee_list.html" id="empMgmtLink">
              <i class="fa-solid fa-users"></i> Employees
          </a>

          <a href="attendance.html">
              <i class="fa-regular fa-clock"></i> Attendance
          </a>

          <a href="holidays.html">
              <i class="fa-regular fa-calendar"></i> Holidays
          </a>

          <!-- Leaves with sub-menu -->
          <a href="javascript:void(0)" id="leavesToggle" class="menu-toggle">
              <span>
                  <i class="fa-solid fa-chart-bar"></i> Leaves
              </span>
              <i class="fa-solid fa-caret-down arrow"></i>
          </a>
          <div id="leavesSubmenu" class="submenu">
              <a href="leave_applications.html">
                  <i class="fa-regular fa-circle"></i> Leave Applications
              </a>
              <a href="leave_master.html">
                  <i class="fa-regular fa-circle"></i> Leave Master
              </a>
          </div>

          <!-- Reports with sub-menu -->
          <a href="javascript:void(0)" id="reportsToggle" class="menu-toggle">
              <span>
                  <i class="fa-solid fa-chart-pie"></i> Reports
              </span>
              <i class="fa-solid fa-caret-down arrow"></i>
          </a>
          <div id="reportsSubmenu" class="submenu">
              <a href="reports.html">
                  <i class="fa-regular fa-circle"></i> General Reports
              </a>
              <a href="attendance_report.html">
                  <i class="fa-regular fa-circle"></i> Attendance Reports
              </a>
              <a href="leave_report.html">
                  <i class="fa-regular fa-circle"></i> Leave Reports
              </a>
          </div>

          <a href="#">
              <i class="fa-solid fa-gear"></i> Settings
          </a>
      </div>

      <div class="support">
          <a href="#">
              <i class="fa-regular fa-circle-question"></i> Help & Support
          </a>
      </div>
  </div>

  <div class="main-content">
    <div class="container">
      <h2>Add New Employee</h2>
      <p>Enter the employee's details below.</p>

      <form id="addEmployeeForm" novalidate>
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" maxlength="40" required
                   oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">
            <small class="error-text" id="fullnameError"></small>
          </div>

          <div class="form-group">
            <label for="empid">Employee ID</label>
            <input type="text" id="empid" maxlength="7" style="text-transform:uppercase"
                   placeholder="e.g., EMP1001" required autocomplete="off">
            <ul id="empid-dropdown"></ul>
            <small class="error-text" id="empidError"></small>
          </div>

          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
            <small class="error-text" id="dobError"></small>
          </div>

          <div class="form-group">
            <label for="doj">Date of Joining</label>
            <input type="date" id="doj" required>
            <small class="error-text" id="dojError"></small>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" maxlength="10" placeholder="9876543210">
            <small class="error-text" id="phoneError"></small>
          </div>

          <div class="form-group full-width">
            <label for="email">Email</label>
            <input type="email" id="email" maxlength="50" placeholder="e.g., john.doe@example.com" required>
            <small class="error-text" id="emailError"></small>
          </div>

          <div class="form-group full-width">
            <label for="address">Address</label>
            <textarea id="address" maxlength="150" rows="2" placeholder="123 Main St, Anytown, USA"></textarea>
            <small class="error-text" id="addressError"></small>
          </div>
        </div>

        <h3>Position Details</h3>
        <div class="form-grid">
          <div class="form-group">
            <label for="department">Department</label>
            <select id="department" required>
              <option value="">Select department</option>
              <option>HR</option>
              <option>Finance</option>
              <option>IT</option>
              <option>Operations</option>
            </select>
          </div>

          <div class="form-group">
            <label for="designation">Designation</label>
            <select id="designation" required>
              <option value="">Select designation</option>
              <option>Manager</option>
              <option>Executive</option>
              <option>Intern</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Employee Type</label>
          <div class="employee-type">
            <label><input type="radio" name="type" value="Regular"> Regular</label>
            <label><input type="radio" name="type" value="Outsourced"> Out Sourced</label>
            <label><input type="radio" name="type" value="Contract"> On Contract</label>
            <label><input type="radio" name="type" value="Apprentice"> Apprentice</label>
            <label><input type="radio" name="type" value="Intern"> Intern</label>
          </div>
        </div>

        <div class="buttons">
          <button type="button" class="btn cancel">Cancel</button>
          <button type="submit" class="btn submit">Add Employee</button>
        </div>
      </form>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  /* ---------------- ADMIN-ONLY ACCESS CHECK ---------------- */
  const role = localStorage.getItem("role");
  if (role !== "admin") {
    alert("Access denied!");
    window.location.href = "dashboard.html";
    return; // stop running the rest of the page's script
  }

  /* ---------------- SIDEBAR ---------------- */
  const currentPage = window.location.pathname.split("/").pop();
  const sidebarLinks = document.querySelectorAll('.sidebar a[href]');

  sidebarLinks.forEach(link => {
    const href = link.getAttribute('href');
    if (href === currentPage || (currentPage === '' && href === 'dashboard.html')) {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });

  const leavesToggle = document.getElementById("leavesToggle");
  const leavesSubmenu = document.getElementById("leavesSubmenu");
  if (leavesToggle && leavesSubmenu) {
    leavesToggle.addEventListener('click', () => {
      leavesToggle.classList.toggle('active');
      leavesSubmenu.classList.toggle('active');
    });
  }

  const reportsToggle = document.getElementById("reportsToggle");
  const reportsSubmenu = document.getElementById("reportsSubmenu");
  if (reportsToggle && reportsSubmenu) {
    reportsToggle.addEventListener('click', () => {
      reportsToggle.classList.toggle('active');
      reportsSubmenu.classList.toggle('active');
    });
  }

  /* ---------------- ELEMENT REFERENCES ---------------- */
  const form = document.getElementById("addEmployeeForm");
  const cancelBtn = document.querySelector(".btn.cancel");

  const fullnameInput = document.getElementById("fullname");
  const empIdInput = document.getElementById("empid");
  const dobInput = document.getElementById("dob");
  const dojInput = document.getElementById("doj");
  const phoneInput = document.getElementById("phone");
  const emailInput = document.getElementById("email");
  const addressInput = document.getElementById("address");
  const departmentInput = document.getElementById("department");
  const designationInput = document.getElementById("designation");

  const fullnameError = document.getElementById("fullnameError");
  const empidError = document.getElementById("empidError");
  const dobError = document.getElementById("dobError");
  const dojError = document.getElementById("dojError");
  const phoneError = document.getElementById("phoneError");
  const emailError = document.getElementById("emailError");
  const addressError = document.getElementById("addressError");

  function showError(el, msg) {
    el.textContent = "❌ " + msg;
    el.style.display = "block";
  }
  function hideError(el) {
    el.style.display = "none";
  }

  /* ---------------- EMPLOYEE ID DROPDOWN ---------------- */
  const dropdown = document.getElementById("empid-dropdown");
  let existingEmpIds = [];

  fetch("http://localhost:3000/api/employees")
    .then(res => res.json())
    .then(data => {
      existingEmpIds = data.map(emp => emp.EmpId);
    })
    .catch(err => console.error("Error fetching empIds:", err));

  function renderDropdown(list) {
    dropdown.innerHTML = "";
    if (list.length > 0) {
      dropdown.style.display = "block";
      list.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        li.addEventListener("click", () => {
          empIdInput.value = item;
          dropdown.style.display = "none";
        });
        dropdown.appendChild(li);
      });
    } else {
      dropdown.style.display = "none";
    }
  }

  empIdInput.addEventListener("focus", () => renderDropdown(existingEmpIds));

  empIdInput.addEventListener("input", () => {
    empIdInput.value = empIdInput.value.toUpperCase();
    const value = empIdInput.value;
    const filtered = existingEmpIds.filter(id => id.toUpperCase().includes(value));
    renderDropdown(filtered);
    hideError(empidError);
  });

  document.addEventListener("click", (e) => {
    if (!empIdInput.parentNode.contains(e.target)) {
      dropdown.style.display = "none";
    }
  });

  /* ---------------- DOB vs DOJ VALIDATION ---------------- */
  const today = new Date().toISOString().split("T")[0];
  dobInput.setAttribute("max", today);

  function validateDOJ() {
    if (!dobInput.value || !dojInput.value) {
      hideError(dojError);
      hideError(dobError);
      return true;
    }

    const dob = new Date(dobInput.value);
    const doj = new Date(dojInput.value);
    const now = new Date();

    if (dob >= now) {
      showError(dobError, "Date of Birth cannot be today or a future date.");
      return false;
    }
    hideError(dobError);

    if (doj > now) {
      showError(dojError, "Joining date cannot be in the future.");
      return false;
    }

    if (doj <= dob) {
      showError(dojError, "Date of Joining must be after Date of Birth.");
      return false;
    }

    const eligibleDate = new Date(dob);
    eligibleDate.setFullYear(eligibleDate.getFullYear() + 21);

    if (doj < eligibleDate) {
      showError(dojError, "Employee must be 21 years old before joining.");
      return false;
    }

    hideError(dojError);
    return true;
  }

  dobInput.addEventListener("input", validateDOJ);
  dojInput.addEventListener("input", validateDOJ);

  /* ---------------- PHONE VALIDATION ---------------- */
  phoneInput.addEventListener("input", function () {
    this.value = this.value.replace(/\D/g, '');
    validatePhone();
  });

  function validatePhone() {
    const phoneVal = phoneInput.value.trim();
    const phoneRegex = /^[6-9]\d{9}$/;
    if (phoneVal === "") {
      hideError(phoneError);
      return true; // optional field
    }
    if (!phoneRegex.test(phoneVal)) {
      showError(phoneError, "Phone number must be exactly 10 digits and start with 6-9.");
      return false;
    }
    hideError(phoneError);
    return true;
  }

  /* ---------------- CANCEL BUTTON ---------------- */
  cancelBtn.addEventListener("click", () => {
    form.reset();
    hideError(dojError);
    hideError(dobError);
    hideError(phoneError);
    hideError(empidError);
    hideError(fullnameError);
    hideError(emailError);
    hideError(addressError);
    setTimeout(() => {
      window.location.href = "employee_list.html";
    }, 1000);
  });

  /* ---------------- SUBMIT ---------------- */
  form.addEventListener("submit", function (e) {
    e.preventDefault();

    let isValid = true;

    // Employee ID format: EMP followed by 4 digits (e.g. EMP1001)
    const empIdRegex = /^EMP\d{4}$/;
    const empIdVal = empIdInput.value.trim().toUpperCase();
    if (!empIdRegex.test(empIdVal)) {
      showError(empidError, "Employee ID must be in the format EMP1001.");
      isValid = false;
    } else if (existingEmpIds.includes(empIdVal)) {
      showError(empidError, "Employee ID already exists.");
      isValid = false;
    } else {
      hideError(empidError);
    }

    // Full Name
    const name = fullnameInput.value.trim();
    const nameRegex = /^[A-Za-z ]+$/;
    if (name === "" || !nameRegex.test(name)) {
      showError(fullnameError, "Full Name should contain only alphabets.");
      isValid = false;
    } else {
      hideError(fullnameError);
    }

    // DOB / DOJ
    if (!validateDOJ()) {
      isValid = false;
    }

    // Phone
    if (!validatePhone()) {
      isValid = false;
    }

    // Email
    const email = emailInput.value.trim();
    const emailRegex = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;
    if (!emailRegex.test(email)) {
      showError(emailError, "Enter a valid email address.");
      isValid = false;
    } else {
      hideError(emailError);
    }

    // Department
    if (departmentInput.value === "") {
      isValid = false;
      alert("Please select Department.");
    }

    // Designation
    if (designationInput.value === "") {
      isValid = false;
      alert("Please select Designation.");
    }

    // Employee Type
    if (!document.querySelector('input[name="type"]:checked')) {
      isValid = false;
      alert("Please select Employee Type.");
    }

    // Address
    const address = addressInput.value.trim();
    if (address.length < 10) {
      showError(addressError, "Address must contain at least 10 characters.");
      isValid = false;
    } else {
      hideError(addressError);
    }

    if (!isValid) {
      return;
    }

    const formData = {
      EmpId: empIdVal,
      Name: name,
      Dept: departmentInput.value,
      Design: designationInput.value,
      DOB: dobInput.value,
      DOJ: dojInput.value,
      Phone: phoneInput.value.trim(),
      Email: email,
      Address: address,
      EmpType: document.querySelector('input[name="type"]:checked')?.value || "Regular",
      Active: 1,
      Username: empIdVal,
      Password: "default123"
    };

    fetch("http://localhost:3000/api/employees", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(formData)
    })
      .then(res => {
        if (!res.ok) throw new Error("Server returned an error");
        return res.json();
      })
      .then(() => {
        alert("Employee added successfully!");
        existingEmpIds.push(formData.EmpId);
        form.reset();
        hideError(dojError);
        hideError(dobError);
        hideError(phoneError);
        hideError(empidError);
        hideError(fullnameError);
        hideError(emailError);
        hideError(addressError);
      })
      .catch(err => {
        console.error("Error adding employee:", err);
        alert("Error adding employee. Check console for details.");
      });
  });

});
</script>

</body>
</html>
